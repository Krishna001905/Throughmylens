// ── CONFIG ──
var BAKED_CONFIG = null; // Fill this in after first setup — see instructions
var DK='ttl_dark_v1', CK='ttl_config_v2';
var db, auth, ghToken, ghUser, ghRepo, isAdmin=false;
var allPosts=[], lbPhotos=[], lbIdx=0;
var pendingPhotos=[], pendingMusicFile=null, pendingMusicName=null;
var trimStartPct=0, trimEndPct=1, trimAudioObj=null, trimPreviewAudio=null, isDragging=null;
var currentAudio=null, carouselIdx=0, carouselTotal=0, touchStartX=0;
var editingPostId=null, prevPage='home';
var aboutData={name:'Your Name',tagline:'Photographer · Nature lover',bio:'Welcome to my photography journal.'};

// ── INIT ──
window.addEventListener('load', function(){
  try {
    if(localStorage.getItem(DK)==='1') setDark(true);
  } catch(e){}
  
  var cfg = null;
  if(BAKED_CONFIG) {
    cfg = BAKED_CONFIG;
  } else {
    try { cfg = JSON.parse(localStorage.getItem(CK)); } catch(e){}
  }
  
  if(cfg && cfg.fb && cfg.ghToken) {
    bootApp(cfg);
  } else {
    showConfigScreen();
  }
});

function showConfigScreen(){
  document.getElementById('config-screen').style.display = 'block';
  document.getElementById('main-app').style.display = 'none';
}

function bootApp(cfg){
  ghToken = cfg.ghToken;
  ghUser = cfg.ghUser;
  ghRepo = cfg.ghRepo;
  try {
    if(!firebase.apps.length) {
      firebase.initializeApp(cfg.fb);
    }
  } catch(e){ console.error('Firebase init error:', e); showConfigScreen(); return; }
  db = firebase.firestore();
  auth = firebase.auth();
  document.getElementById('config-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  auth.onAuthStateChanged(function(user){
    isAdmin = !!user;
    setAdminUI(isAdmin);
  });
  loadAbout();
  loadHeroBg();
  renderPosts();
}

// ── SAVE CONFIG ──
window.saveConfig = function(){
  var raw = document.getElementById('firebase-config-input').value.trim();
  var token = document.getElementById('gh-token').value.trim();
  var user = document.getElementById('gh-username').value.trim();
  var repo = document.getElementById('gh-repo').value.trim();
  var err = document.getElementById('config-error');
  err.style.display = 'none';
  if(!token || !user || !repo){ err.textContent='Please fill in all GitHub fields.'; err.style.display='block'; return; }
  var fbCfg;
  try {
    // Try JSON parse first
    try { fbCfg = JSON.parse(raw); }
    catch(e){
      // Clean up JS object syntax
      var cleaned = raw
        .replace(/\/\/.*/g, '')
        .replace(/const\s+\w+\s*=\s*/, '')
        .replace(/;$/, '')
        .replace(/([{,]\s*)(\w+)(\s*:)/g, '$1"$2"$3')
        .replace(/'/g, '"')
        .trim();
      if(!cleaned.startsWith('{')) cleaned = '{' + cleaned + '}';
      fbCfg = JSON.parse(cleaned);
    }
    if(!fbCfg.apiKey) throw new Error('Missing apiKey');
    var cfg = {fb: fbCfg, ghToken: token, ghUser: user, ghRepo: repo};
    localStorage.setItem(CK, JSON.stringify(cfg));
    showDownloadConfigured(cfg);
    bootApp(cfg);
  } catch(e){
    err.textContent = 'Could not parse Firebase config: ' + e.message + '. Make sure you select the "Config" radio button in Firebase and copy the full object.';
    err.style.display = 'block';
  }
};

function showDownloadConfigured(cfg){
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;display:flex;align-items:center;justify-content:center;';
  overlay.innerHTML = '<div style="background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2rem;max-width:420px;width:90%;font-family:var(--fb);">'
    + '<div style="font-family:var(--fd);font-size:1.4rem;font-weight:300;margin-bottom:.6rem;color:var(--ink)">✅ Connected successfully!</div>'
    + '<p style="font-size:.83rem;color:var(--bark-light);line-height:1.8;margin-bottom:1.2rem;">One more step — download the <strong>configured file</strong> and re-upload it to GitHub.<br><br>This bakes your config in so <strong>friends go straight to the blog</strong> — no setup screen ever.</p>'
    + '<button onclick="downloadConfigured()" style="background:var(--moss);color:#fff;border:none;padding:.8rem 1.8rem;font-family:var(--fb);font-size:.73rem;letter-spacing:.15em;text-transform:uppercase;border-radius:2px;cursor:pointer;margin-right:.7rem;">⬇ Download configured file</button>'
    + '<button onclick="this.closest('[style*=z-index]').remove()" style="background:transparent;color:var(--bark-light);border:1px solid var(--border);padding:.8rem 1.4rem;font-family:var(--fb);font-size:.73rem;letter-spacing:.15em;text-transform:uppercase;border-radius:2px;cursor:pointer;">Skip for now</button>'
    + '</div>';
  document.body.appendChild(overlay);
}

window.downloadConfigured = function(){
  var cfg = JSON.parse(localStorage.getItem(CK));
  fetch(window.location.href)
    .then(function(r){ return r.text(); })
    .then(function(html){
      var newHtml = html.replace(
        'var BAKED_CONFIG = null;',
        'var BAKED_CONFIG = ' + JSON.stringify(cfg) + ';'
      );
      var blob = new Blob([newHtml], {type:'text/html'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'index.html';
      a.click();
      URL.revokeObjectURL(a.href);
      var overlays = document.querySelectorAll('[style*="z-index:9999"]');
      overlays.forEach(function(o){ o.remove(); });
    });
};

// ── GITHUB UPLOAD ──
function compressImage(file, maxWidth, quality){
  maxWidth = maxWidth || 1200; quality = quality || 0.78;
  return new Promise(function(resolve){
    var img = new Image();
    var url = URL.createObjectURL(file);
    img.onload = function(){
      var w=img.width, h=img.height;
      if(w>maxWidth){ h=Math.round(h*maxWidth/w); w=maxWidth; }
      var canvas = document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      canvas.toBlob(function(blob){ resolve(blob); }, 'image/jpeg', quality);
      URL.revokeObjectURL(url);
    };
    img.src = url;
  });
}

function fileToBase64(file){
  return new Promise(function(resolve){
    var reader = new FileReader();
    reader.onload = function(e){ resolve(e.target.result.split(',')[1]); };
    reader.readAsDataURL(file);
  });
}

async function uploadToGitHub(file, folder, filename){
  var uploadFile = file;
  if(file.type && file.type.startsWith('image/')){ uploadFile = await compressImage(file); }
  var base64 = await fileToBase64(uploadFile instanceof Blob ? uploadFile : file);
  var path = folder + '/' + filename;
  var url = 'https://api.github.com/repos/' + ghUser + '/' + ghRepo + '/contents/' + path;
  var sha = null;
  try {
    var r = await fetch(url, {headers:{'Authorization':'token '+ghToken,'Accept':'application/vnd.github.v3+json'}});
    if(r.ok){ var d=await r.json(); sha=d.sha; }
  } catch(e){}
  var body = {message:'Add '+filename, content:base64};
  if(sha) body.sha = sha;
  var resp = await fetch(url, {method:'PUT', headers:{'Authorization':'token '+ghToken,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'}, body:JSON.stringify(body)});
  if(!resp.ok){ var e=await resp.json(); throw new Error(e.message||'GitHub upload failed'); }
  return 'https://raw.githubusercontent.com/' + ghUser + '/' + ghRepo + '/main/' + path;
}

async function deleteFromGitHub(rawUrl){
  var match = rawUrl.match(/raw\.githubusercontent\.com\/[^/]+\/[^/]+\/main\/(.+)/);
  if(!match) return;
  var path = match[1];
  var url = 'https://api.github.com/repos/' + ghUser + '/' + ghRepo + '/contents/' + path;
  try {
    var r = await fetch(url, {headers:{'Authorization':'token '+ghToken,'Accept':'application/vnd.github.v3+json'}});
    if(!r.ok) return;
    var d = await r.json();
    await fetch(url, {method:'DELETE', headers:{'Authorization':'token '+ghToken,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'}, body:JSON.stringify({message:'Delete '+path, sha:d.sha})});
  } catch(e){}
}

// ── RENDER HOME ──
async function renderPosts(){
  var grid = document.getElementById('posts-grid');
  grid.innerHTML = '<div class="loading"><span class="spinner"></span>Loading…</div>';
  try {
    var snap = await db.collection('posts').orderBy('ts','desc').get();
    allPosts = snap.docs.map(function(d){ return Object.assign({id:d.id}, d.data()); });
    document.getElementById('post-count').textContent = allPosts.length + (allPosts.length===1?' entry':' entries');
    if(!allPosts.length){
      grid.innerHTML = '<div class="empty-posts"><p class="ep-title">No posts yet</p><p>' + (isAdmin?'Click "+ New" to write your first entry':'Check back soon!') + '</p></div>';
      return;
    }
    grid.innerHTML = allPosts.map(function(p){
      var imgHtml = p.coverUrl
        ? '<img class="card-img" src="'+p.coverUrl+'" alt="" loading="lazy">'
        : '<div class="card-img-ph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>';
      var mb = p.musicUrl ? '<span class="music-badge">♪</span>' : '';
      var title = p.title || '<em style="opacity:.45;font-style:italic">Untitled</em>';
      var excerpt = p.body ? '<p>'+p.body.substring(0,105)+(p.body.length>105?'…':'')+'</p>' : '';
      return '<div class="post-card" onclick="openPost(''+p.id+'')">'
        +imgHtml+'<div class="post-meta"><span class="post-tag">'+(p.category||'General')+'</span><span class="post-date">'+fmtDate(p.ts)+'</span>'+mb+'</div>'
        +'<h2>'+title+'</h2>'+excerpt+'<span class="read-more">Open →</span></div>';
    }).join('');
  } catch(e){
    grid.innerHTML = '<div class="empty-posts"><p class="ep-title">Error</p><p>'+e.message+'</p></div>';
  }
}

// ── ALL POSTS ──
window.renderAllPosts = async function(){
  if(!allPosts.length){ try{ var s=await db.collection('posts').orderBy('ts','desc').get(); allPosts=s.docs.map(function(d){return Object.assign({id:d.id},d.data());}); }catch(e){} }
  var sortBy = document.getElementById('sort-by').value;
  var filterCat = document.getElementById('filter-cat').value;
  var cats = [...new Set(allPosts.map(function(p){return p.category||'General';}))].sort();
  var catSel = document.getElementById('filter-cat'); var cv = catSel.value;
  catSel.innerHTML = '<option value="all">All categories</option>' + cats.map(function(c){ return '<option value="'+c+'"'+(c===cv?' selected':'')+'>'+c+'</option>'; }).join('');
  var sorted = allPosts.slice();
  if(filterCat!=='all') sorted = sorted.filter(function(p){ return (p.category||'General')===filterCat; });
  if(sortBy==='date-asc') sorted.sort(function(a,b){ return (a.ts&&a.ts.seconds||0)-(b.ts&&b.ts.seconds||0); });
  else if(sortBy==='date-desc') sorted.sort(function(a,b){ return (b.ts&&b.ts.seconds||0)-(a.ts&&a.ts.seconds||0); });
  else sorted.sort(function(a,b){ return (a.category||'').localeCompare(b.category||''); });
  document.getElementById('allposts-count').textContent = sorted.length+(sorted.length===1?' entry':' entries');
  var list = document.getElementById('posts-list');
  if(!sorted.length){ list.innerHTML='<div style="text-align:center;padding:3rem 2rem;color:var(--bark-light)">No posts in this category</div>'; return; }
  list.innerHTML = sorted.map(function(p){
    var thumb = p.coverUrl ? '<img src="'+p.coverUrl+'" alt="" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;">' : '<div class="pli-thumb-ph"></div>';
    var title = p.title || '<em style="opacity:.45;font-style:italic">Untitled</em>';
    var excerpt = p.body ? '<p class="pli-excerpt">'+p.body.substring(0,90)+(p.body.length>90?'…':'')+'</p>' : '';
    var mb = p.musicUrl ? '<span class="music-badge">♪</span>' : '';
    return '<div class="post-list-item" onclick="openPost(''+p.id+'','allposts')">'
      +'<div class="pli-thumb">'+thumb+'</div>'
      +'<div class="pli-body"><div class="post-meta"><span class="post-tag">'+(p.category||'General')+'</span><span class="post-date">'+fmtDate(p.ts)+'</span>'+mb+(p.location?'<span class="post-date">· '+p.location+'</span>':'')+'</div>'
      +'<div class="pli-title">'+title+'</div>'+excerpt+'</div>'
      +'<div class="pli-arrow">›</div></div>';
  }).join('');
};

// ── OPEN POST ──
window.openPost = async function(postId, from){
  prevPage = from || 'home'; stopMusic();
  var content = document.getElementById('single-post-content');
  content.innerHTML = '<div class="loading"><span class="spinner"></span>Loading post…</div>';
  showPage('post', from);
  try {
    var snap = await db.collection('posts').doc(postId).get();
    if(!snap.exists){ content.innerHTML='<p>Post not found.</p>'; return; }
    var p = Object.assign({id:snap.id}, snap.data());
    var photos = p.photoUrls || [];
    lbPhotos = photos.slice(); lbIdx = 0;
    var muteBtn = p.musicUrl ? '<button class="photo-mute-btn" id="photo-mute-btn" onclick="toggleMute()" title="Mute/Unmute">🔊</button>' : '';
    var n = photos.length;
    var photosHtml = '';
    if(n>0){
      photosHtml = '<div class="post-photo-wrap" id="carousel-wrap">'
        +'<div class="post-photo-gallery" id="carousel-track">'+photos.map(function(src,i){ return '<img src="'+src+'" alt="" onclick="openLb('+i+')" loading="lazy">'; }).join('')+'</div>'
        +(n>1?'<button class="carousel-btn carousel-prev" onclick="carouselMove(-1)">&#8592;</button><button class="carousel-btn carousel-next" onclick="carouselMove(1)">&#8594;</button><div class="carousel-dots" id="carousel-dots">'+photos.map(function(_,i){ return '<div class="carousel-dot'+(i===0?' active':'')+'" onclick="carouselGo('+i+')"></div>'; }).join('')+'</div>':'')
        +muteBtn+'</div>';
    } else if(p.musicUrl){
      photosHtml = '<div class="post-photo-wrap" style="min-height:50px;">'+muteBtn+'</div>';
    }
    var title = p.title ? '<h1>'+p.title+'</h1>' : '';
    var body = p.body ? '<div class="post-body">'+p.body+'</div>' : '';
    var adminActions = isAdmin ? '<div class="post-actions"><button class="edit-btn" onclick="startEdit(''+p.id+'')">✎ Edit</button><button class="del-btn" onclick="deletePost(''+p.id+'')">Delete</button></div>' : '';
    content.innerHTML = photosHtml+'<div class="post-meta"><span class="post-tag">'+(p.category||'General')+'</span><span class="post-date">'+fmtDate(p.ts)+(p.location?' · '+p.location:'')+'</span></div>'+title+(title&&body?'<div class="divider"></div>':'')+body+'<div class="divider"></div>'+adminActions;
    initCarousel();
    if(p.musicUrl){
      currentAudio = new Audio(p.musicUrl);
      currentAudio.volume = 0.8;
      currentAudio.addEventListener('loadedmetadata', function(){
        var dur = currentAudio.duration;
        currentAudio._trimStart = (p.musicTrimStart||0)*dur;
        currentAudio._trimEnd = (p.musicTrimEnd||1)*dur;
        currentAudio.currentTime = currentAudio._trimStart;
        currentAudio.play().catch(function(){});
      });
      currentAudio.addEventListener('timeupdate', updateProgress);
    }
  } catch(e){ content.innerHTML='<p style="color:var(--bark-light)">Could not load post. '+e.message+'</p>'; }
};

// ── DELETE ──
window.deletePost = async function(id){
  if(!confirm('Delete this post?')) return;
  stopMusic();
  try {
    var snap = await db.collection('posts').doc(id).get();
    var p = snap.data();
    var urls = (p.photoUrls||[]).concat(p.musicUrl?[p.musicUrl]:[]);
    for(var i=0;i<urls.length;i++) await deleteFromGitHub(urls[i]);
    await db.collection('posts').doc(id).delete();
    allPosts = allPosts.filter(function(x){ return x.id!==id; });
    showPage('home');
  } catch(e){ alert('Error: '+e.message); }
};

// ── PHOTO PICKER ──
document.addEventListener('DOMContentLoaded', function(){
  document.getElementById('photo-file-input').addEventListener('change', function(){
    Array.from(this.files).forEach(function(file){
      var reader = new FileReader();
      reader.onload = function(e){ pendingPhotos.push({dataUrl:e.target.result, file:file}); renderPendingPhotos(); };
      reader.readAsDataURL(file);
    });
    this.value = '';
  });
  document.getElementById('music-file-input').addEventListener('change', function(){
    var file = this.files[0]; if(!file) return;
    pendingMusicFile = file; pendingMusicName = file.name;
    document.getElementById('music-file-name').textContent = file.name;
    trimStartPct=0; trimEndPct=1;
    document.getElementById('trim-box').style.display = 'block';
    var url = URL.createObjectURL(file);
    trimAudioObj = new Audio(url);
    trimAudioObj.addEventListener('loadedmetadata', function(){ drawWaveform(url, trimAudioObj.duration); updateTrimLabels(trimAudioObj.duration); });
    this.value = '';
  });
  // Trim handles
  function startDrag(side,e){ e.preventDefault(); isDragging=side; document.addEventListener('mousemove',onDrag); document.addEventListener('mouseup',stopDrag); document.addEventListener('touchmove',onDrag,{passive:false}); document.addEventListener('touchend',stopDrag); }
  function onDrag(e){ if(!isDragging) return; e.preventDefault(); var wrap=document.getElementById('trim-waveform'); var rect=wrap.getBoundingClientRect(); var cx=e.touches?e.touches[0].clientX:e.clientX; var pct=Math.max(0,Math.min(1,(cx-rect.left)/rect.width)); if(isDragging==='left') trimStartPct=Math.min(pct,trimEndPct-.02); else trimEndPct=Math.max(pct,trimStartPct+.02); updateTrimRegion(); }
  function stopDrag(){ isDragging=null; document.removeEventListener('mousemove',onDrag); document.removeEventListener('mouseup',stopDrag); document.removeEventListener('touchmove',onDrag); document.removeEventListener('touchend',stopDrag); }
  var lh=document.getElementById('trim-handle-left'); if(lh){ lh.addEventListener('mousedown',function(e){startDrag('left',e);}); lh.addEventListener('touchstart',function(e){startDrag('left',e);},{passive:false}); }
  var rh=document.getElementById('trim-handle-right'); if(rh){ rh.addEventListener('mousedown',function(e){startDrag('right',e);}); rh.addEventListener('touchstart',function(e){startDrag('right',e);},{passive:false}); }
});

function renderPendingPhotos(){
  var grid = document.getElementById('photo-preview-grid');
  if(!pendingPhotos.length){ grid.style.display='none'; return; }
  grid.style.display='grid'; grid.innerHTML='';
  pendingPhotos.forEach(function(p,i){
    var div=document.createElement('div'); div.className='photo-thumb';
    div.innerHTML='<img src="'+p.dataUrl+'" alt=""><button class="photo-thumb-del" onclick="removePhoto('+i+')">✕</button>';
    grid.appendChild(div);
  });
  var add=document.createElement('button'); add.className='add-more-btn'; add.textContent='+';
  add.onclick=function(){ document.getElementById('photo-file-input').click(); };
  grid.appendChild(add);
}
window.removePhoto = function(idx){ pendingPhotos.splice(idx,1); renderPendingPhotos(); };
window.removeMusic = function(){ pendingMusicFile=null; pendingMusicName=null; trimStartPct=0; trimEndPct=1; if(trimPreviewAudio){trimPreviewAudio.pause();trimPreviewAudio=null;} document.getElementById('music-file-name').textContent='No music selected'; document.getElementById('trim-box').style.display='none'; };

function drawWaveform(url,dur){
  var canvas=document.getElementById('trim-canvas'); var wrap=document.getElementById('trim-waveform');
  canvas.width=wrap.offsetWidth||600; canvas.height=44; var ctx=canvas.getContext('2d');
  fetch(url).then(function(r){return r.arrayBuffer();}).then(function(buf){
    var ac=new(window.AudioContext||window.webkitAudioContext)();
    ac.decodeAudioData(buf,function(decoded){
      var data=decoded.getChannelData(0); var step=Math.ceil(data.length/canvas.width);
      ctx.fillStyle=document.documentElement.getAttribute('data-theme')==='dark'?'rgba(138,170,122,.55)':'rgba(61,90,62,.45)';
      for(var i=0;i<canvas.width;i++){var max=0;for(var j=0;j<step;j++)max=Math.max(max,Math.abs(data[i*step+j]||0));var h=Math.max(2,max*canvas.height*.9);ctx.fillRect(i,(canvas.height-h)/2,1,h);}
      ac.close();
    },function(){ ctx.fillStyle='rgba(61,90,62,.3)'; for(var i=0;i<canvas.width;i+=3)ctx.fillRect(i,14,2,16); });
  });
  updateTrimRegion();
}
function updateTrimRegion(){ var r=document.getElementById('trim-region'); r.style.left=(trimStartPct*100)+'%'; r.style.width=((trimEndPct-trimStartPct)*100)+'%'; if(trimAudioObj&&trimAudioObj.duration) updateTrimLabels(trimAudioObj.duration); }
function updateTrimLabels(dur){ var s=trimStartPct*dur,e=trimEndPct*dur; document.getElementById('trim-start-label').textContent='Start: '+fmtTime(s); document.getElementById('trim-end-label').textContent='End: '+fmtTime(e); document.getElementById('trim-dur-label').textContent='Clip: '+fmtTime(e-s); }
window.previewTrim = function(){ if(!pendingMusicFile) return; if(trimPreviewAudio){trimPreviewAudio.pause();trimPreviewAudio=null;} var btn=document.getElementById('trim-preview-btn'); var url=URL.createObjectURL(pendingMusicFile); trimPreviewAudio=new Audio(url); var dur=trimAudioObj?trimAudioObj.duration:0; trimPreviewAudio.currentTime=trimStartPct*dur; trimPreviewAudio.play(); btn.textContent='⏹ Stop'; trimPreviewAudio.addEventListener('timeupdate',function(){if(trimPreviewAudio&&trimPreviewAudio.currentTime>=trimEndPct*dur){trimPreviewAudio.pause();btn.textContent='▶ Preview clip';}}); trimPreviewAudio.addEventListener('ended',function(){btn.textContent='▶ Preview clip';}); };

// ── SAVE POST ──
function setProgress(pct,label){ var w=document.getElementById('progress-wrap'); var f=document.getElementById('progress-fill'); var l=document.getElementById('progress-label'); w.style.display='block'; f.style.width=pct+'%'; l.textContent=label; }
function hideProgress(){ document.getElementById('progress-wrap').style.display='none'; }

window.savePost = async function(){
  var title=document.getElementById('post-title').value.trim();
  var body=document.getElementById('post-body').value.trim();
  if(!title&&!body&&!pendingPhotos.length){ alert('Please add at least a title, story, or photo.'); return; }
  var btn=document.getElementById('save-btn'); btn.textContent='Saving…'; btn.disabled=true;
  document.getElementById('error-msg').style.display='none';
  try {
    var postId = editingPostId || ('post_'+Date.now());
    var photoUrls=[];
    for(var i=0;i<pendingPhotos.length;i++){
      setProgress(Math.round((i/pendingPhotos.length)*70),'Uploading photo '+(i+1)+' of '+pendingPhotos.length+'…');
      var fname=Date.now()+'_'+i+'.jpg';
      var url=await uploadToGitHub(pendingPhotos[i].file,'photos/'+postId,fname);
      photoUrls.push(url);
    }
    var musicUrl=null;
    if(pendingMusicFile){
      setProgress(80,'Uploading music…');
      var ext=pendingMusicFile.name.split('.').pop();
      musicUrl=await uploadToGitHub(pendingMusicFile,'music/'+postId,'music.'+ext);
    }
    setProgress(90,'Saving post…');
    var coverUrl=photoUrls[0]||null;
    var postData={title:title,body:body,category:document.getElementById('post-category').value,location:document.getElementById('post-location').value.trim(),ts:firebase.firestore.FieldValue.serverTimestamp(),photoUrls:photoUrls,coverUrl:coverUrl,musicUrl:musicUrl,musicTrimStart:trimStartPct,musicTrimEnd:trimEndPct};
    if(editingPostId){ await db.collection('posts').doc(editingPostId).update(postData); }
    else { await db.collection('posts').add(postData); }
    setProgress(100,'Done!');
    var s2=await db.collection('posts').orderBy('ts','desc').get(); allPosts=s2.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    clearWriteForm(); hideProgress();
    var msg=document.getElementById('success-msg'); msg.style.display='block';
    setTimeout(function(){ msg.style.display='none'; showPage('home'); },1600);
  } catch(e){
    hideProgress();
    var err=document.getElementById('error-msg'); err.textContent='Error: '+e.message; err.style.display='block';
  } finally { btn.textContent='Save post'; btn.disabled=false; }
};

// ── EDIT ──
window.startEdit = async function(id){
  editingPostId=id; document.getElementById('write-heading').textContent='Edit post';
  try {
    var snap=await db.collection('posts').doc(id).get(); var p=Object.assign({id:snap.id},snap.data());
    document.getElementById('post-title').value=p.title||''; document.getElementById('post-body').value=p.body||''; document.getElementById('post-location').value=p.location||'';
    var sel=document.getElementById('post-category'); for(var i=0;i<sel.options.length;i++){if(sel.options[i].value===p.category)sel.selectedIndex=i;}
    if(p.photoUrls&&p.photoUrls.length){ var grid=document.getElementById('photo-preview-grid'); grid.style.display='grid'; grid.innerHTML=p.photoUrls.map(function(u){return '<div class="photo-thumb"><img src="'+u+'" alt=""></div>';}).join('')+'<div style="font-size:.7rem;color:var(--bark-light);grid-column:1/-1;padding:.3rem 0">Add new photos to replace existing ones</div>'; }
    if(p.musicUrl){ document.getElementById('music-file-name').textContent='Music saved — pick new to replace'; trimStartPct=p.musicTrimStart||0; trimEndPct=p.musicTrimEnd||1; }
    showPage('write');
  } catch(e){ alert('Could not load post.'); }
};
function clearWriteForm(){
  document.getElementById('post-title').value=''; document.getElementById('post-body').value=''; document.getElementById('post-location').value=''; document.getElementById('post-category').selectedIndex=0;
  document.getElementById('write-heading').textContent='New post';
  pendingPhotos=[]; renderPendingPhotos(); pendingMusicFile=null; pendingMusicName=null;
  document.getElementById('music-file-name').textContent='No music selected'; document.getElementById('trim-box').style.display='none';
  trimStartPct=0; trimEndPct=1; editingPostId=null;
  document.getElementById('success-msg').style.display='none'; document.getElementById('error-msg').style.display='none';
}
window.cancelEdit = function(){ clearWriteForm(); showPage('home'); };

// ── CAROUSEL ──
function initCarousel(){
  var track=document.getElementById('carousel-track'); if(!track) return;
  carouselTotal=track.children.length; carouselIdx=0; if(carouselTotal<=1) return;
  var wrap=document.getElementById('carousel-wrap');
  wrap.addEventListener('touchstart',function(e){touchStartX=e.touches[0].clientX;},{passive:true});
  wrap.addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-touchStartX;if(Math.abs(dx)>40)carouselMove(dx<0?1:-1);});
}
window.carouselMove = function(dir){ carouselIdx=Math.max(0,Math.min(carouselTotal-1,carouselIdx+dir)); carouselApply(); };
window.carouselGo = function(i){ carouselIdx=i; carouselApply(); };
function carouselApply(){
  var track=document.getElementById('carousel-track'); if(track) track.style.transform='translateX(-'+(carouselIdx*100)+'%)';
  document.querySelectorAll('.carousel-dot').forEach(function(d,i){d.classList.toggle('active',i===carouselIdx);});
  var prev=document.querySelector('.carousel-prev'); var next=document.querySelector('.carousel-next');
  if(prev) prev.style.opacity=carouselIdx===0?'0.3':'1';
  if(next) next.style.opacity=carouselIdx===carouselTotal-1?'0.3':'1';
}

// ── MUSIC ──
window.toggleMute = function(){ if(!currentAudio) return; currentAudio.muted=!currentAudio.muted; var btn=document.getElementById('photo-mute-btn'); if(btn) btn.textContent=currentAudio.muted?'🔇':'🔊'; };
function updateProgress(){ if(!currentAudio) return; var s=currentAudio._trimStart||0,e=currentAudio._trimEnd||currentAudio.duration||1; if(currentAudio.currentTime>=e){currentAudio.currentTime=s;currentAudio.play().catch(function(){});} }
function stopMusic(){ if(currentAudio){currentAudio.pause();currentAudio=null;} }

// ── LIGHTBOX ──
window.openLb = function(i){ lbIdx=i; document.getElementById('lb-img').src=lbPhotos[i]; document.getElementById('lb-wrap').classList.add('open'); };
window.closeLb = function(){ document.getElementById('lb-wrap').classList.remove('open'); };
window.lbNav = function(dir){ lbIdx=(lbIdx+dir+lbPhotos.length)%lbPhotos.length; document.getElementById('lb-img').src=lbPhotos[lbIdx]; };

// ── ABOUT ──
async function loadAbout(){
  try { var snap=await db.collection('settings').doc('about').get(); if(snap.exists) aboutData=Object.assign(aboutData,snap.data()); } catch(e){}
  renderAbout();
}
function renderAbout(){
  document.getElementById('about-name').textContent=aboutData.name;
  document.getElementById('about-tagline').textContent=aboutData.tagline;
  document.getElementById('about-bio').textContent=aboutData.bio;
  document.getElementById('about-initials').textContent=aboutData.name.split(' ').map(function(w){return w[0];}).join('').substring(0,2).toUpperCase()||'YN';
  document.getElementById('hero-bio-text').textContent=aboutData.bio;
  document.getElementById('footer-txt').textContent=aboutData.name+"'s Photography Journal";
}
window.toggleAboutEdit = function(){
  var f=document.getElementById('about-edit-form');
  if(f.style.display==='none'||!f.style.display){ document.getElementById('edit-name').value=aboutData.name; document.getElementById('edit-tagline').value=aboutData.tagline; document.getElementById('edit-bio').value=aboutData.bio; f.style.display='block'; }
  else { f.style.display='none'; }
};
window.saveAbout = async function(){
  aboutData.name=document.getElementById('edit-name').value.trim()||'Your Name';
  aboutData.tagline=document.getElementById('edit-tagline').value.trim()||'Photographer';
  aboutData.bio=document.getElementById('edit-bio').value.trim();
  try { await db.collection('settings').doc('about').set(aboutData); } catch(e){}
  renderAbout(); document.getElementById('about-edit-form').style.display='none';
};

function fmtTime(s){ if(!s||isNaN(s)) return '0:00'; var m=Math.floor(s/60),sec=Math.floor(s%60); return m+':'+(sec<10?'0':'')+sec; }
